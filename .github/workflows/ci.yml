name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: typecheck · test · browser-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build + headless browser smoke test
        run: npm run verify
