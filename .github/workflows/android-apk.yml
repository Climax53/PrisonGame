name: Android debug APK

# Builds an installable Android debug APK you can download from the Actions run
# and side-load onto your Samsung phone (Settings → allow "Install unknown
# apps" for your browser/Files app). This gives you the *real native app* feel
# without needing a computer. Trigger it from the Actions tab (Run workflow), or
# it runs automatically on pushes to the work branch.

on:
  workflow_dispatch:
  push:
    branches: ["claude/medieval-jail-game-design-byirr0"]

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # GitHub-hosted Ubuntu runners ship with the Android SDK preinstalled.
      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Generate & sync the Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wardens-keep-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
